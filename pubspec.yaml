name: sinav_ligi_app
description: "Bilgi Rotası - Sınav Hazırlık Uygulaması"
publish_to: 'none'
version: 1.0.0+37

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Tasarım ve İkonlar ---
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  flutter_html: ^3.0.0-alpha.6

  # --- Firebase Servisleri ---
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2

  # --- Reklam ---
  google_mobile_ads: ^5.1.0

  # --- Satın Alma ---
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+10
  in_app_purchase_platform_interface: ^1.4.0

  # --- Dosya İşlemleri ve API ---
  excel: ^4.0.6
  http: ^1.3.0
  path_provider: ^2.1.5
  share_plus: ^13.1.0

  # --- Bildirim ---
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  shared_preferences: ^2.0.0

  # --- İnternet Kontrolü ---
  connectivity_plus: ^7.1.1

  # --- Ana Ekran Widget ---
  home_widget: 0.7.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0

# ── Uygulama İkonu Yapılandırması ─────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#06092B"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 23

# ── Native Splash Ekranı Yapılandırması ───────────────────────────────────────
flutter_native_splash:
  color: "#06092B"
  image: "assets/images/logo.png"
  android: true
  ios: false
  fullscreen: true
  android_12:
    color: "#06092B"
    image: "assets/images/logo.png"

# ── Flutter Yapılandırması ────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  config:
    enable-swift-package-manager: false

  assets:
    # --- Genel Asset Klasörleri ---
    - assets/
    - assets/images/
    - assets/images/avatars/
    - assets/icons/

    # --- PDF Dosyaları ---
    - assets/pdfs/tarih_kpss.pdf
    - assets/pdfs/cografya_kpss.pdf
    - assets/pdfs/ayt_edebiyat.pdf
    - assets/pdfs/ayt_biyoloji.pdf
    - assets/pdfs/tyt_biyoloji.pdf
    - assets/pdfs/felsefe.pdf

    # --- Deneme Klasörleri ---
    - assets/denemeler/
    - assets/denemeler/tyt_deneme/
    - assets/denemeler/ayt_sayisal_deneme/
    - assets/denemeler/ayt_esitagirlik_deneme/
    - assets/denemeler/sozel_deneme/
    - assets/denemeler/kpss_lisans/
    - assets/denemeler/kpss_önlisans/

    # --- Mini Deneme Klasörleri ---
    - assets/mini_denemeler/

    # --- TYT Klasörleri ---
    - assets/tyt_turkce/
    - assets/tyt_matematik/
    - assets/tyt_tarih/
    - assets/tyt_cografya/
    - assets/tyt_felsefe/
    - assets/tyt_din/
    - assets/tyt_biyoloji/
    - assets/tyt_fizik/
    - assets/tyt_kimya/

    # --- AYT Sayısal Klasörleri ---
    - assets/ayt_sayisal_matematik/
    - assets/ayt_sayisal_fizik/
    - assets/ayt_sayisal_kimya/
    - assets/ayt_sayisal_biyoloji/

    # --- AYT Eşit Ağırlık Klasörleri ---
    - assets/ayt_esitagirlik_matematik/
    - assets/ayt_esitagirlik_edebiyat/
    - assets/ayt_esitagirlik_tarih/
    - assets/ayt_esitagirlik_cografya/

    # --- AYT Sözel Klasörleri ---
    - assets/ayt_sozel_felsefe/
    - assets/ayt_sozel_din/

    # --- KPSS Lisans Klasörleri ---
    - assets/kpss_lisans_turkce/
    - assets/kpss_lisans_matematik/
    - assets/kpss_lisans_tarih/
    - assets/kpss_lisans_cografya/
    - assets/kpss_lisans_vatandaslik/

    # --- KPSS Önlisans Klasörleri ---
    - assets/kpss_onlisans_turkce/
    - assets/kpss_onlisans_matematik/
    - assets/kpss_onlisans_tarih/
    - assets/kpss_onlisans_cografya/
    - assets/kpss_onlisans_vatandaslik/
